<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="assets/css/styles.css">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Crear Cuenta</title>
</head>
<body class="page">
     <header class="navbar">
        <div class="navbar__logo">
            QuickForm
        </div>

        <nav class="navbar__menu">
            <a href="#" class="navbar__link">Inicio</a>
            <a href="#" class="navbar__link">Precios</a>
            <a href="#" class="navbar__link">Soporte</a>
            <a href="#" class="navbar__link navbar__link--login">Iniciar Sesión</a>
        </nav>
    </header>
    <main class="page__main">
        <section class="card card--register">

            <!-- Header -->
            <header class="card__header">
                <h1 class="card__title">Crea tu cuenta Gratis</h1>
                <p class="card__subtitle">
                    Regístrate en segundos y comienza a explorar
                </p>
            </header>


            <!-- Formulario -->
            <form class="form form--register" action="#" method="post">

                <!-- Grupo: Nombre -->
               <div class="form__group">
<label class="form__label" for="nombre">Nombre Completo</label>

<div class="form__input-wrapper">
<i class="fa-regular fa-user form__icon"></i>

<input 
class="form__input" 
type="text" 
id="nombre" 
name="nombre"
placeholder="Ej. Sofía Rodríguez"
required>

</div>
</div>
                <!-- Grupo: Email -->
                <div class="form__group">
<label class="form__label" for="email">Correo Electrónico</label>

<div class="form__input-wrapper">
<i class="fa-regular fa-envelope form__icon"></i>

<input 
class="form__input"
type="email"
id="email"
name="email"
placeholder="tuemail@ejemplo.com"
required>

</div>
</div>
                <!-- Grupo: Password -->
                <div class="form__group">
<label class="form__label" for="password">Contraseña</label>

<div class="form__input-wrapper">

<i class="fa-solid fa-lock form__icon"></i>

<input 
class="form__input form__input--password"
type="password"
id="password"
name="password"
placeholder="************"
required>

<button type="button" class="form__toggle-password">
<i class="fa-regular fa-eye"></i>
</button>

</div>
</div>

                <!-- Grupo: Teléfono -->
              <div class="form__group">
<label class="form__label" for="telefono">Teléfono</label>

<div class="form__input-wrapper">
<i class="fa-solid fa-phone form__icon"></i>

<input 
class="form__input"
type="tel"
id="telefono"
name="telefono"
placeholder="+34 600 123 456">

</div>
</div>
                <div class="form__group">
<label class="form__label" for="pais">País</label>

<div class="form__input-wrapper">

<i class="fa-solid fa-globe form__icon"></i>

<select 
class="form__input form__select"
id="pais"
name="pais">

<option value="es">España</option>
<option value="mx">México</option>
<option value="ar">Argentina</option>
<option value="co">Colombia</option>

</select>

</div>
</div>
                <!-- Checkbox -->
                <div class="form__group form__group--checkbox">
                    <input 
                        class="form__checkbox" 
                        type="checkbox" 
                        id="terminos" 
                        name="terminos" 
                        required>
                    <label class="form__label form__label--inline" for="terminos">
                        Acepto los Términos y Condiciones
                    </label>
                </div>

                <!-- Botón -->
                <div class="form__group">
                    <button class="button button--primary button--full" type="submit">
                        Crear Cuenta
                    </button>
                </div>

            </form>

            <!-- Footer -->
            <footer class="card__footer">
            <div class="card__divider">
    <span class="card__divider-text">O regístrate con:</span>
</div>
                
                <nav class="social-login">

                 <a href="#" class="social-login__icon" aria-label="Google">

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" width="24" height="24">

<path fill="#FFC107" d="M43.611 20.083H42V20H24v8h11.303C33.649 32.657 29.193 36 24 36c-6.627 0-12-5.373-12-12s5.373-12 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.09 6.053 29.29 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-1.341-.138-2.65-.389-3.917z"/>

<path fill="#FF3D00" d="M6.306 14.691l6.571 4.819C14.655 16.108 18.961 13 24 13c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.09 6.053 29.29 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"/>

<path fill="#4CAF50" d="M24 44c5.145 0 9.86-1.977 13.409-5.191l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.17 0-9.613-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"/>

<path fill="#1976D2" d="M43.611 20.083H42V20H24v8h11.303c-.87 2.328-2.37 4.356-4.274 5.571l6.19 5.238C36.971 39.205 44 34 44 24c0-1.341-.138-2.65-.389-3.917z"/>

</svg>

</a>

    <a href="#" class="social-login__icon social-login__icon--facebook" aria-label="Facebook">
        <i class="fa-brands fa-facebook"></i>
    </a>

    <a href="#" class="social-login__icon social-login__icon--apple" aria-label="Apple">
        <i class="fa-brands fa-apple"></i>
    </a>

</nav>
            </footer>

        </section>
    </main>
<footer class="footer">
        <p class="footer__text">
            © 2026 QuickForm | Desarrollado por <strong>Maricarmen Suárez</strong>
        </p>
    </footer>

</body>
</html>
