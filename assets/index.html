<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Cuenta</title>
</head>
<body class="page">

    <main class="page__main">
        <section class="card card--register">

            <!-- Header -->
            <header class="card__header">
                <h1 class="card__title">Crea tu cuenta Gratis</h1>
                <p class="card__subtitle">
                    Regístrate en segundos y comienza a explorar
                </p>
            </header>

            <!-- Formulario -->
            <form class="form form--register" action="#" method="post">

                <!-- Grupo: Nombre -->
                <div class="form__group">
                    <label class="form__label" for="nombre">Nombre Completo</label>
                    <input 
                        class="form__input" 
                        type="text" 
                        id="nombre" 
                        name="nombre" 
                        placeholder="Ej. Sofía Rodríguez" 
                        required>
                </div>

                <!-- Grupo: Email -->
                <div class="form__group">
                    <label class="form__label" for="email">Correo Electrónico</label>
                    <input 
                        class="form__input" 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="tuemail@ejemplo.com" 
                        required>
                </div>

                <!-- Grupo: Password -->
                <div class="form__group">
                    <label class="form__label" for="password">Contraseña</label>
                    <div class="form__input-wrapper">
                        <input 
                            class="form__input form__input--password" 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="************" 
                            required>
                        <button 
                            type="button" 
                            class="form__toggle-password"
                            aria-label="Mostrar contraseña">
                            👁
                        </button>
                    </div>
                </div>

                <!-- Grupo: Teléfono -->
                <div class="form__group">
                    <label class="form__label" for="telefono">Teléfono</label>
                    <input 
                        class="form__input" 
                        type="tel" 
                        id="telefono" 
                        name="telefono" 
                        placeholder="+34 600 123 456">
                </div>

                <!-- Grupo: País -->
                <div class="form__group">
                    <label class="form__label" for="pais">País</label>
                    <select 
                        class="form__input form__select" 
                        id="pais" 
                        name="pais">
                        <option value="es">España</option>
                        <option value="mx">México</option>
                        <option value="ar">Argentina</option>
                        <option value="co">Colombia</option>
                    </select>
                </div>

                <!-- Checkbox -->
                <div class="form__group form__group--checkbox">
                    <input 
                        class="form__checkbox" 
                        type="checkbox" 
                        id="terminos" 
                        name="terminos" 
                        required>
                    <label class="form__label form__label--inline" for="terminos">
                        Acepto los Términos y Condiciones
                    </label>
                </div>

                <!-- Botón -->
                <div class="form__group">
                    <button class="button button--primary button--full" type="submit">
                        Crear Cuenta
                    </button>
                </div>

            </form>

            <!-- Footer -->
            <footer class="card__footer">
                <p class="card__divider-text">O regístrate con:</p>
                
                <nav class="social-login">
                    <a href="#" class="social-login__link social-login__link--google" aria-label="Registrarse con Google">
                        Google
                    </a>
                    <a href="#" class="social-login__link social-login__link--facebook" aria-label="Registrarse con Facebook">
                        Facebook
                    </a>
                    <a href="#" class="social-login__link social-login__link--apple" aria-label="Registrarse con Apple">
                        Apple
                    </a>
                </nav>
            </footer>

        </section>
    </main>

</body>
</html>
